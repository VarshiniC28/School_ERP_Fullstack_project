<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Fee Overview - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>.sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }</style>
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-primary shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
      <i class="bi bi-shield-lock-fill me-2"></i>Admin Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">

    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/students}"><i class="bi bi-people-fill me-2"></i>Students</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/faculty}"><i class="bi bi-person-badge-fill me-2"></i>Faculty</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/courses}"><i class="bi bi-book-fill me-2"></i>Courses</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/timetable}"><i class="bi bi-calendar3 me-2"></i>Timetable</a></li>
        <li><a class="nav-link active text-primary fw-bold" th:href="@{/admin/fees}"><i class="bi bi-cash-stack me-2"></i>Fees</a></li>
      </ul>
    </nav>

    <main class="col-md-10 px-4 py-4">
      <h4 class="fw-bold text-secondary mb-4">Fee Overview — All Students</h4>

      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Summary Cards — counts passed directly from controller -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card border-0 shadow text-center">
            <div class="card-body">
              <h6 class="text-muted">Total Records</h6>
              <h2 class="fw-bold text-primary" th:text="${#lists.size(fees)}">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-0 shadow text-center">
            <div class="card-body">
              <h6 class="text-muted">Fees Cleared</h6>
              <h2 class="fw-bold text-success" th:text="${clearedCount}">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-0 shadow text-center">
            <div class="card-body">
              <h6 class="text-muted">Fees Pending</h6>
              <h2 class="fw-bold text-danger" th:text="${pendingCount}">0</h2>
            </div>
          </div>
        </div>
      </div>

      <!-- Fees Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>Student Name</th>
                <th>Class</th>
                <th>Academic Year</th>
                <th>Total (₹)</th>
                <th>Paid (₹)</th>
                <th>Balance (₹)</th>
                <th>Last Payment</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="fee : ${fees}">
                <td th:text="${fee.student.name}"></td>
                <td th:text="${fee.student.classNumber}"></td>
                <td th:text="${fee.academicYear}"></td>
                <td th:text="${fee.totalAmount}"></td>
                <td th:text="${fee.paidAmount}"></td>
                <td th:class="${fee.cleared} ? 'text-success fw-bold' : 'text-danger fw-bold'"
                    th:text="${fee.totalAmount - fee.paidAmount}"></td>
                <td th:text="${fee.lastPaymentDate != null ? fee.lastPaymentDate : '—'}"></td>
                <td>
                  <span th:if="${fee.cleared}" class="badge bg-success">Cleared</span>
                  <span th:unless="${fee.cleared}" class="badge bg-danger">Pending</span>
                </td>
                <td>
                  <form th:unless="${fee.cleared}"
                        th:action="@{/admin/fees/update/{id}(id=${fee.student.id})}"
                        method="post" class="d-inline">
                    <input type="hidden" name="cleared" value="true">
                    <button type="submit" class="btn btn-sm btn-success"
                            onclick="return confirm('Mark as fully cleared?')">
                      <i class="bi bi-check-lg"></i> Clear
                    </button>
                  </form>
                  <span th:if="${fee.cleared}" class="text-success small">
                    <i class="bi bi-check-circle-fill"></i> Done
                  </span>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(fees)}">
                <td colspan="9" class="text-center text-muted py-4">
                  <i class="bi bi-inbox fs-3 d-block mb-2"></i>No fee records yet.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
